<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - Blog</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* --- GLOBAL --- */
      body {
        margin: 0;
        background-color: #ebd5bb;
        font-family: 'Fredoka', sans-serif;
        width: 100%;

      }

      /* HEADER */
      header {
        width: 1400px;
        margin: 0 auto;
        background-color: #a1836c;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 80px;
      }

      header img {
        height: 80px;
      }

      /* NAV */
      nav ul {
        list-style: none;
        display: flex;
        gap: 50px;
        margin: 0;
        padding: 0;
      }

      nav a {
        color: #d79b8e;
        text-decoration: none;
        font-size: 40px;
        font-weight: 600;
      }

      nav li a:hover {
        text-decoration: underline;
      }

      /* WATCH GRID SECTION */
      .watch-section {
        width: 1100px;
        margin: 0 auto;
        padding: 40px;
      }

      .watch-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 40px;
      }

      /* POSTER FRAME */
      .poster-frame {
        background-color: #a1836c;
        padding: 25px;
        display: flex;
        justify-content: center;
        align-items: center;

      }

      .poster-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .title-text {
        color: #a1836c;
        font-size: 140px;
        font-weight: 600;
        line-height: 0.9;
        max-width: 1100px;  
        text-align: center;
      }

      .sub-text {
        color: #d79b8e;
        font-size: 28px;
        font-weight: 600;
        margin-top: 15px;
        margin-bottom: 20px;
        letter-spacing: 2px;
        text-align: center;
      }
    </style>
  </head>

  <body>

    <body>
      <!-- HEADER -->
      <header>
        <a href="index.html">
          <img src="Button.png" alt="Home button of a rabbit with large black glasses" style="width:120px; height:120px">
        </a>
        <nav>
          <ul>
            <li><a href="chinatravel.html">Travel</a></li>
            <li><a href="watch.html">Watch</a></li>
            <li><a href="mywork.html">My Work</a></li>
          </ul>
        </nav>
      </header>

      <main class="watch-section">
        <div class="title-text">
          SHOW <br>RECOMENDATIONS!
        </div>
        <div class="sub-text"> ~THESE SHOWS HAVE BEEN HELPING ME THROUGH UNIVERSITY~ </div>
        <div class="watch-grid">

          <div class="poster-frame">
            <img src="psych1775143252.png" alt="Psych">
          </div>

          <div class="poster-frame">
            <img src="apothecary diaries1775143249.png" alt="The Apothecary Diaries">
          </div>

          <div class="poster-frame">
            <img src="sweet tooth1775143254.png" alt="Sweet Tooth">
          </div>

          <div class="poster-frame">
            <img src="saikiK.1775143252.png" alt="The Disastrous Life of Saiki K">
          </div>

          <div class="poster-frame">
            <img src="evil1775143251.png" alt="Evil">
          </div>

          <div class="poster-frame">
            <img src="frieren1775143252.png" alt="Frieren: Beyond Journey's End">
          </div>

        </div>
      </main>

    </body>
</html>
